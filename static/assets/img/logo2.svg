<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  
  <!-- Background -->
  <rect x="0" y="0" width="512" height="512" rx="100" fill="#0f172a"></rect>

  <!-- Gradient -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a3e635;stop-opacity:1"></stop>
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:1"></stop>
    </linearGradient>
  </defs>

  <!-- WN Text -->
  <text x="50%" y="60%" text-anchor="middle" font-size="180" font-family="Arial, sans-serif" fill="url(#grad1)" font-weight="bold">
    WN
  </text>

  <!-- Gear -->
  <g transform="translate(340,110) scale(0.7)">
    <circle cx="60" cy="60" r="30" fill="#e5e7eb"></circle>
    <g fill="#e5e7eb">
      <rect x="55" y="0" width="10" height="25"></rect>
      <rect x="55" y="95" width="10" height="25"></rect>
      <rect x="0" y="55" width="25" height="10"></rect>
      <rect x="95" y="55" width="25" height="10"></rect>
    </g>
  </g>

</svg>