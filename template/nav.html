{% load static %}
<style>
    .nav-logo{
display:flex;
align-items:center;
}

.nav-logo img{
height:32px;
width:auto;
object-fit:contain;

}
@media (max-width:768px){

.nav-logo img{
height:15px;
}
nav{
display:flex;
align-items:center;
justify-content:space-between;
flex-wrap:wrap;
}
}
.site-logo{
height:42px;
cursor:pointer;
margin-right:8px;   /* 👈 image aur text ke beech gap */
border-radius:8px;
transition:all .4s ease;
animation:logoFloat 3s ease-in-out infinite;
}

/* Hover effect */

.site-logo:hover{
transform:scale(1.1);
filter:drop-shadow(0 8px 20px rgba(0,0,0,0.25));
}
.logo-text{
font-size:22px;
font-weight:800;
letter-spacing:2px;
background:linear-gradient(45deg,#000,#555,#000);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
transition:all .3s ease;
cursor:pointer;
}

/* Hover effect */


.nav-left{
display:flex;
align-items:center;
gap:8px;
}

/* Floating animation */

@keyframes logoFloat{

0%{
transform:translateY(0);
}

50%{
transform:translateY(-4px);
}

100%{
transform:translateY(0);
}

}
@media (max-width:768px){

.site-logo{
height:34px;   /* mobile me thoda chhota */
animation:none;
margin-right:6px; /* optional: mobile me animation band kar sakte ho */
}
.logo-text{
font-size:18px;
}
.nav-left{
display:flex;
align-items:center;
gap:8px;
}
}
</style>
<nav>   
       <a href="{% url 'home' %}" class="nav-logo">
    <img src="{% static 'assets/img/logo2.svg' %}" alt="Worknex Logo" class="site-logo">
     <div class="logo-text" > WORKNEX</div>
</a>
       
       <form method="GET" action="{% url 'services' %}" class="nav-center">

<select class="location-dropdown" name="location">
<option value="">📍 Your Location</option>
<option value="bhopal">Bhopal</option>
<option value="indore">Indore</option>
<option value="delhi">Delhi</option>
</select>

<input type="text" 
name="search" 
class="search-input" 
placeholder="Search services...">

</form>
        <div class="menu-toggle" id="menuToggle">
        ☰
    </div>
        
        
        <div class="nav-right">
             <a href="{% url 'home' %}" class="nav-link">Home</a>
             <a href="{% url 'my_bookings' %}" class="nav-link">My Booking</a>
            <a href="{% url 'part' %}" class="nav-link">Parts</a>
            <a href="{% url 'services' %}" class="nav-link">Services</a>
            {% comment %} <div class="profile-avatar">👤</div> {% endcomment %}
            

        <a href="{% url 'user_profile' %}" class="profile-avatar">
            {% if user.profile_image %}
                <img src="{{ user.profile_image.url }}" alt="Profile">
            {% else %}
                👤
            {% endif %} </a>
            {% if user.is_authenticated %}
<a href="{% url 'logout' %}" class="btn-signin">Logout</a>
{% else %}
<a href="{% url 'signin' %}" class="btn-signin">SignIn/Up</a>
{% endif %}
            <a href="#cart" class="nav-link" onclick="openCart(event)">Cart</a>
        </div>
    </nav>
